{% set version = "0.9.0" %}
{% set build = 0 %}

# {{ PYTHON }} is not resolved properly in multi-output recipes...
{% set PYTHON = "python" %}
{% set PYTHON = "$PREFIX/bin/python" %}  # [linux]
{% set PYTHON = "%PREFIX%\\python" %}  # [win]

package:
  name: nvmath-split
  version: {{ version }}

source:
  - url: https://github.com/NVIDIA/nvmath-python/archive/refs/tags/v{{ ".".join(version.split(".")[:3]) }}.tar.gz
    sha256: 58479b53803ec8590b768f22f6d76558168ba0193bc40cb175001417b9c01e45
    patches:
      - patches/0002-Update-example-for-Windows.patch  # [win]

build:
  number: {{ build }}
  skip: true  # [py<310 or py>314 or osx or not (cuda_compiler_version or "").startswith("13")]

# Have certain top-level requirements so conda-smithy can render the correct variants
requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cuda') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
  host:
    - python

outputs:

  - name: nvmath-python-core
    build:
      script:
        - export CUDA_PATH=$BUILD_PREFIX/targets/x86_64-linux/   # [linux64]
        - export CUDA_PATH=$BUILD_PREFIX/targets/sbsa-linux/     # [aarch64]
        - set CUDA_PATH=%BUILD_PREFIX%\Library                   # [win64]
        - >-
          {{ PYTHON }} -m pip install --no-deps --no-build-isolation -v .
      ignore_run_exports:
        - cuda-version
        - cuda-python
      ignore_run_exports_from:
        - cuda-cudart-dev
      force_ignore_keys:
        - pytorch
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ compiler('cuda') }}
        - {{ stdlib('c') }}
      host:
        - cuda-version {{ cuda_compiler_version }}
        - cython >=3.2.0
        - pip
        - python
        - setuptools >=77.0.3
        - tomli >=2.0.1  # [py<311]
      run:
        - cuda-version >=12,<14.0a0
        # pyproject.toml/dependencies
        - cuda-bindings
        - cuda-core >=0.4.2,<1.0
        - cuda-pathfinder >=1.4.4,<2.0
        - numpy >=1.25,<3
        - python
        - pywin32  # [win64]
      run_constrained:
        # pyproject.toml/project/dependency-groups/oldest
        - cupy >=12.1.0
        - pytorch >=2.1.0

  - name: nvmath-python
    build:
      force_ignore_keys:
        - pytorch
    requirements:
      run:
        - {{ pin_subpackage("nvmath-python-core", max_pin='x.x.x') }}
        # pyproject.toml/project/optional-dependencies/sysctkXX
        - cuda-bindings >=12.9.2,<14,!=13.0.0
        - cutensor >=2.5.0,<3
        # pyproject.toml/project/optional-dependencies/cuXX
        - cuda-core
        - libcublas
        - cuda-nvrtc
        - cuda-cudart
        - libcudss 0.7.*
        - libcufft
        - libcurand
        - libcusolver
        - libcusparse
    test:
      source_files:
        - examples/fft
        - examples/linalg
        - examples/sparse
        - examples/tensor
        - tests/example_tests
        - tests/nvmath_tests
      requires:
        - cupy
        - pip
        - pytest
        # We don't compile pytorch against CC 7.5 on linux-aarch64. However, our linux-aarch64 CI runner supports max CC 7.5 (Nvidia T4G).
        # So, do not install pytorch on linux-aarch64 and the tests will automatically skip.
        #- pytorch =*=cpu_*  # [aarch64]
        - pytorch-gpu  # [not aarch64]
        - scipy
      imports:
        - nvmath
        - nvmath.fft
        - nvmath.linalg
        - nvmath.sparse
        - nvmath.tensor
      commands:
        - pip check
        - pytest tests/example_tests/matmul_tests/ -k "example01 and not cpu" -v -ra
        - pytest tests/example_tests/fft_tests/ -k "example01 and not (cpu or callback)" -v -ra
        - pytest tests/example_tests/sparse_tests/ -k "example01" -v -ra
        - pytest tests/example_tests/tensor_tests/ -k "example01" -v -ra

  - name: nvmath-python-numba
    requirements:
      run:
        - {{ pin_subpackage("nvmath-python", max_pin='x.x.x') }}
        # pyproject.toml/project/optional-dependencies/numba
        - numba
        - numba-cuda >=0.28.1

  - name: nvmath-python-dx
    build:
      force_ignore_keys:
        - pytorch
    requirements:
      run:
        - {{ pin_subpackage("nvmath-python", max_pin='x.x.x') }}
        - {{ pin_subpackage("nvmath-python-numba", max_pin='x.x.x') }}
        # pyproject.toml/project/optional-dependencies/dx
        - numba
        - numba-cuda
        # pyproject.toml/project/optional-dependencies/cu12-dx
        - libmathdx >=0.3.1,<0.4.0,!=0.3.1.8
        - cuda-cccl >12.4.127
        - cuda-nvrtc !=12.4.*,!=12.5.0
        # Device APIs need headers for JIT compile
        - libcurand-dev
    test:
      requires:
        - pip
        - pytest
        - cccl-python
        - cffi
        - cupy
        - scipy
        - psutil
      source_files:
        - examples/device
        - examples/fft/common.py
        - examples/fft/*callback*.py
        - tests/example_tests
        - tests/nvmath_tests
      imports:
        - nvmath.device
        - nvmath
        - nvmath.fft
        - nvmath.linalg
        - nvmath.sparse
      commands:
        - pip check
        - pytest tests/example_tests/device_tests/ -v -ra -k "fp or curand"
        - pytest tests/example_tests/fft_tests/ -k "callback" -v -ra
    about:
      license: Apache-2.0
      license_file: LICENSE
      license_family: Apache
      summary: Install this meta-package to use nvmath-python device features
      description: >-
        This is a meta-package which installs a some optional dependencies. The main package is nvmath-python.
      doc_url: https://docs.nvidia.com/cuda/nvmath-python
      dev_url: https://github.com/NVIDIA/nvmath-python

  - name: nvmath-python-cpu
    build:
      force_ignore_keys:
        - pytorch
    requirements:
      run:
        - {{ pin_subpackage("nvmath-python-core", max_pin='x.x.x') }}
        - mkl >=2024,<2026  # [x86_64 or linux64]
        - libnvpl-fft0 >=0.3,<1  # [arm64 or aarch64]
        - libnvpl-blas0 >=0.3,<1  # [arm64 or aarch64]
    test:
      source_files:
        - examples/fft/example*cpu_execution.py
        - examples/linalg/generic/matmul/example*cpu*.py
        - tests/example_tests
        - tests/nvmath_tests
      requires:
        - pip
        - pytest
        # We don't compile pytorch against CC 7.5 on linux-aarch64. However, our linux-aarch64 CI runner supports max CC 7.5 (Nvidia T4G).
        # So, do not install pytorch on linux-aarch64 and the tests will automatically skip.
        #- pytorch =*=cpu_*  # [aarch64]
        - pytorch  # [not aarch64]
      imports:
        - nvmath
        - nvmath.fft
        - nvmath.linalg
      commands:
        - pip check
        # The tests strictly require a CUDA-enabled pytorch version.
        # Skip linux-aarch64 builds due to pytorch-gpu not supporting CC 7.5 (see above comment).
        - pytest tests/example_tests/fft_tests/ -k cpu -v -ra     # [not aarch64]
        - pytest tests/example_tests/matmul_tests/ -k cpu -v -ra  # [not aarch64]
    about:
      license: Apache-2.0
      license_file: LICENSE
      license_family: Apache
      summary: Install this meta-package to use nvmath-python cpu features
      description: >-
        This is a meta-package which installs a some optional dependencies. The main package is nvmath-python.
      doc_url: https://docs.nvidia.com/cuda/nvmath-python
      dev_url: https://github.com/NVIDIA/nvmath-python

  - name: nvmath-python-distributed
    build:
      skip: true  # [win]
      force_ignore_keys:
        - pytorch
    requirements:
      run:
        - {{ pin_subpackage("nvmath-python-core", max_pin='x.x.x') }}
        - {{ pin_subpackage("nvmath-python", max_pin='x.x.x') }}
        - nccl >=2.29.2
        - nccl4py
        - libcublasmp >=0.8.1,<1
        - libcufftmp
        - libnvshmem3 >=3.2.5
    test:
      source_files:
        - examples/distributed
        - tests/example_tests
        - tests/nvmath_tests
      requires:
        - pip
        - pytest
        # We don't compile pytorch against CC 7.5 on linux-aarch64. However, our linux-aarch64 CI runner supports max CC 7.5 (Nvidia T4G).
        # So, do not install pytorch on linux-aarch64 and the tests will automatically skip.
        #- pytorch =*=cpu_*  # [aarch64]
        - pytorch-gpu  # [not aarch64]
      imports:
        - nvmath
        - nvmath.distributed
        - nvmath.distributed.fft
      commands:
        - pip check
        # - mpiexec -n 2 pytest tests/example_tests/distributed_tests -v -ra -k "not sync"
    about:
      license: Apache-2.0
      license_file: LICENSE
      license_family: Apache
      summary: Install this meta-package to use nvmath-python distributed features
      description: >-
        This is a meta-package which installs a some optional dependencies. The main package is nvmath-python.
      doc_url: https://docs.nvidia.com/cuda/nvmath-python
      dev_url: https://github.com/NVIDIA/nvmath-python

  - name: nvmath-python-install-test-12
    requirements:
      run:
        - cuda-version 12.*
        - nvmath-python
        - nvmath-python-cpu
        - nvmath-python-dx
        - nvmath-python-distributed  # [not win]
    test:
      imports:
        - nvmath
        - nvmath.distributed  # [not win]
        - nvmath.distributed.fft  # [not win]
        - nvmath.fft
        - nvmath.linalg
        - nvmath.sparse
        - nvmath.tensor

  - name: nvmath-python-install-test-13
    requirements:
      run:
        - cuda-version 13.*
        - nvmath-python
        - nvmath-python-cpu
        - nvmath-python-dx
        - nvmath-python-distributed  # [not win]
        - cupy
    test:
      imports:
        - nvmath
        - nvmath.distributed  # [not win]
        - nvmath.distributed.fft  # [not win]
        - nvmath.fft
        - nvmath.linalg
        - nvmath.sparse
        - nvmath.tensor
        - cupy

about:
  home: https://developer.nvidia.com/nvmath-python
  license: Apache-2.0
  license_url: https://docs.nvidia.com/cuda/nvmath-python/latest/license.html
  license_file: LICENSE
  license_family: Apache
  summary: NVIDIA Math Libraries for the Python Ecosystem
  description: >-
    nvmath-python aims to bring the power and performance of the NVIDIA math libraries to the Python ecosystem with intuitive, pythonic APIs. The ultimate goal is to provide users full access to all of the available library features in a variety of execution spaces.

    To enable optional features, install any of the following packages: nvmath-python-cpu, nvmath-python-dx.
  doc_url: https://docs.nvidia.com/cuda/nvmath-python
  dev_url: https://github.com/NVIDIA/nvmath-python

extra:
  feedstock-name: nvmath
  recipe-maintainers:
    - conda-forge/cuda
    - carterbox
    - leofang
